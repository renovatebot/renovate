[[repos]]
repo = "https://github.com/pre-commit/mirrors-prettier"
rev = "v4.0.0-alpha.8"

[[repos.hooks]]
id = "prettier"
language = "node"
additional_dependencies = [
  "prettier@^3.6.2",
  "@trivago/prettier-plugin-sort-imports@^5.2.2",
  "not-a-valid-node-spec",
]

[[repos.hooks]]
id = "noop"

[[repos.hooks]]
id = "unsupported"
language = "rust"
additional_dependencies = [
  "serde@1.0.0",
]

[[repos]]
repo = "https://github.com/pre-commit/mirrors-mypy"
rev = "v1.15.0"

[[repos.hooks]]
id = "mypy"
language = "python"
additional_dependencies = [
  "types-requests==2.31.0",
  "/invalid-python-dep",
]

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.7"

[[repos.hooks]]
id = "actionlint"
language = "golang"
additional_dependencies = [
  "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.10.0",
  "invalid-golang-dep",
]
